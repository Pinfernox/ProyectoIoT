<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smart Bus - Control Central</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #1e1e2f; color: white; padding: 20px; }
        .card { background-color: #2a2a40; border: none; color: white; margin-bottom: 20px;}
        .dato-grande { font-size: 2.5rem; font-weight: bold; color: #00d2ff; }
        p { color: white; }
        .alerta-box { background-color: #ff4c4c; padding: 10px; border-radius: 5px; font-weight: bold; display: none;}
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">🚌 Centro de Control</h1>
        
        <div id="cajaAlerta" class="alerta-box text-center mb-4">
            ⚠️ ALERTA ACTIVA: <span id="textoAlerta"></span>
        </div>

        <div class="row text-center">
            <div class="col-md-3">
                <div class="card p-3">
                    <h5>Velocidad</h5>
                    <div class="dato-grande"><span id="valVel">0</span> km/h</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <h5>Pasajeros</h5>
                    <div class="dato-grande"><span id="valPax">0</span>/50</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <h5>Temperatura</h5>
                    <div class="dato-grande"><span id="valTemp">0</span> °C</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <h5>Humedad</h5>
                    <div class="dato-grande"><span id="valHum">0</span> %</div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="card p-3">
                    <h5>Histórico de Velocidad (Tiempo Real)</h5>
                    <canvas id="graficaVelocidad" height="100"></canvas>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Control Manual ESP32</h5>
                    <p class="text-white small">Mandar órdenes físicas al autobús.</p>
                    <button class="btn btn-danger mb-2" onclick="mandarAlerta('LLENO')">📢 Forzar Alarma Lleno</button>
                    <button class="btn btn-warning mb-2" onclick="mandarAlerta('DESVIO')">🗺️ Forzar Alarma Desvío</button>
                </div>
                <div class="card p-3 text-center">
                    <h5>GPS Actual</h5>
                    <p id="valGPS" class="mb-0 text-white">Buscando...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración de la gráfica
        const ctx = document.getElementById('graficaVelocidad').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Velocidad (km/h)', data: [], borderColor: '#00d2ff', tension: 0.4 }] },
            options: { scales: { y: { beginAtZero: true, max: 100 } } }
        });

        // Función para consultar los datos a Python cada 1 segundo
        setInterval(() => {
            fetch('/api/datos')
                .then(response => response.json())
                .then(data => {
                    // 1. Actualizar números
                    document.getElementById('valVel').innerText = data.speed;
                    document.getElementById('valPax').innerText = data.passengers;
                    document.getElementById('valTemp').innerText = parseFloat(data.temp).toFixed(2);
                    document.getElementById('valHum').innerText = data.hum;
                    document.getElementById('valGPS').innerText = `[${data.lon.toFixed(4)}, ${data.lat.toFixed(4)}]`;

                    // 2. Comprobar Alertas Automáticas
                    const caja = document.getElementById('cajaAlerta');
                    if (data.alerta !== "OK") {
                        caja.style.display = "block";
                        document.getElementById('textoAlerta').innerText = data.alerta;
                    } else {
                        caja.style.display = "none";
                    }

                    // 3. Actualizar Gráfica
                    const horaActual = new Date().toLocaleTimeString();
                    if(chart.data.labels.length > 15) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                    chart.data.labels.push(horaActual);
                    chart.data.datasets[0].data.push(data.speed);
                    chart.update();
                });
        }, 1000);

        // Función para los botones manuales
        function mandarAlerta(orden) {
            fetch('/api/alerta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ orden: orden })
            }).then(() => alert(`Orden "${orden}" enviada al ESP32`));
        }
    </script>
</body>
</html>
